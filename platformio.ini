[env:esp32dev]
platform = espressif32@6.3.2
board = esp32dev
framework = arduino
monitor_speed = 115200
# 添加下面这两行
build_flags = 
    -std=gnu++17
build_unflags = 
    -std=gnu++11
    
lib_deps =
    adafruit/Adafruit PN532
    earlephilhower/ESP8266Audio@1.9.7
    bodmer/TFT_eSPI@2.5.43